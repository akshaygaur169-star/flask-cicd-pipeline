apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels: 
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-container
        image: 176741406061.dkr.ecr.us-east-1.amazonaws.com/flask-cicd-app:latest
        ports:
        - containerPort: 5000
        